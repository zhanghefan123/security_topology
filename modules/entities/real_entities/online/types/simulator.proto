syntax = "proto3";

option go_package = "../types";

enum SimPacketType {
  DataPacket = 0;
  AckPacket = 1;
}

enum NodeMaliciousActionType {
  CorruptPacket = 0;
  DropPacket = 1;
}

enum SimNetworkNodeType {
  EndHost = 0;
  NormalRouter = 1;
  PathValidationRouter = 2;
}

enum SimDirectedLinkType {
  SimDirectedNormalLink = 0;
  SimDirectedPvLink = 1;
  SimDirectedAccessLink = 2;
}

enum SimRecorderType {
  BloomFilterRecorder = 0;
  CountRecorder = 1;
}

enum GainCalculationMode {
  SumEdgeGains = 0;
  SumEdgeAndRouterGains = 1;
}

enum SimStrategy {
  PerBatchBloomFilter = 0;
  PerPacketAck = 1;
}

enum SimAlgorithm {
  Exp3 = 0;
  OSMD = 1;
}